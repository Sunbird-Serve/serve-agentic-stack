# SERVE AI - Docker Compose Configuration
# Local development setup for all services

version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: serve-postgres
    environment:
      POSTGRES_USER: serve
      POSTGRES_PASSWORD: servepassword
      POSTGRES_DB: serve_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U serve -d serve_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - serve-network

  # Domain Service (Database owner, HTTP API) - Port 8003
  serve-domain-service:
    build:
      context: ./serve-domain-service
      dockerfile: Dockerfile
    container_name: serve-domain-service
    environment:
      - DATABASE_URL=postgresql+asyncpg://serve:servepassword@postgres:5432/serve_db
      - PORT=8003
      - CORS_ORIGINS=*
    ports:
      - "8003:8003"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - serve-network

  # MCP Server (Model Context Protocol) - Port 8004
  serve-mcp-server:
    build:
      context: ./serve-mcp-server
      dockerfile: Dockerfile
    container_name: serve-mcp-server
    environment:
      - DATABASE_URL=postgresql+asyncpg://serve:servepassword@postgres:5432/serve_db
      - PORT=8004
    ports:
      - "8004:8004"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - serve-network

  # Onboarding Agent Service - Port 8002
  serve-onboarding-agent-service:
    build:
      context: ./serve-onboarding-agent-service
      dockerfile: Dockerfile
    container_name: serve-onboarding-agent-service
    environment:
      - PORT=8002
      - CORS_ORIGINS=*
      - DOMAIN_SERVICE_URL=http://serve-domain-service:8003
      - MCP_SERVER_URL=http://serve-mcp-server:8004
      - LLM_PROVIDER=claude
      - LLM_MODEL=claude-sonnet-4-5-20250929
      - EMERGENT_LLM_KEY=${EMERGENT_LLM_KEY}
    ports:
      - "8002:8002"
    depends_on:
      - serve-domain-service
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - serve-network

  # Orchestrator Service - Port 8001
  serve-orchestrator:
    build:
      context: ./serve-orchestrator
      dockerfile: Dockerfile
    container_name: serve-orchestrator
    environment:
      - PORT=8001
      - CORS_ORIGINS=*
      - DOMAIN_SERVICE_URL=http://serve-domain-service:8003
      - MCP_SERVER_URL=http://serve-mcp-server:8004
      - ONBOARDING_AGENT_URL=http://serve-onboarding-agent-service:8002
    ports:
      - "8001:8001"
    depends_on:
      - serve-domain-service
      - serve-onboarding-agent-service
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - serve-network

  # Frontend UI - Port 3000
  serve-ai-ui:
    build:
      context: ./serve-ai-ui
      dockerfile: Dockerfile
    container_name: serve-ai-ui
    environment:
      - REACT_APP_BACKEND_URL=http://localhost:8001
    ports:
      - "3000:3000"
    depends_on:
      - serve-orchestrator
    networks:
      - serve-network

volumes:
  postgres_data:
    driver: local

networks:
  serve-network:
    name: serve-network
    driver: bridge
